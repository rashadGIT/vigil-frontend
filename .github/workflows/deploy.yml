name: Deploy Frontend

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Trigger Amplify Build
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CDK_ROLE_ARN }}
          aws-region: us-east-2

      - name: Cancel any running Amplify jobs
        run: |
          RUNNING=$(aws amplify list-jobs \
            --app-id dlrm9a0dpsu77 \
            --branch-name main \
            --query 'jobSummaries[?status==`RUNNING` || status==`PENDING`].jobId' \
            --output text)
          for JID in $RUNNING; do
            echo "Stopping Amplify job: $JID"
            aws amplify stop-job \
              --app-id dlrm9a0dpsu77 \
              --branch-name main \
              --job-id $JID
          done

      - name: Start Amplify job
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id dlrm9a0dpsu77 \
            --branch-name main \
            --job-type RELEASE \
            --query 'jobSummary.jobId' \
            --output text)
          echo "Amplify job started: $JOB_ID"
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Wait for build
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id dlrm9a0dpsu77 \
              --branch-name main \
              --job-id $JOB_ID \
              --query 'job.summary.status' \
              --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then exit 0; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then exit 1; fi
            sleep 30
          done
          echo "Timed out waiting for Amplify build"
          exit 1
