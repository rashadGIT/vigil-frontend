name: Bundle Size

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-size:
    name: Report Bundle Size
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PR branch
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Measure PR bundle
        id: pr-size
        run: |
          TOTAL=$(find .next/static -name "*.js" | xargs wc -c | tail -1 | awk '{print $1}')
          echo "bytes=$TOTAL" >> $GITHUB_OUTPUT
          echo "PR bundle: $TOTAL bytes"

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          clean: false

      - name: Install base dependencies
        run: npm ci

      - name: Build base branch
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Measure base bundle
        id: base-size
        run: |
          TOTAL=$(find .next/static -name "*.js" | xargs wc -c | tail -1 | awk '{print $1}')
          echo "bytes=$TOTAL" >> $GITHUB_OUTPUT
          echo "Base bundle: $TOTAL bytes"

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const prBytes = parseInt('${{ steps.pr-size.outputs.bytes }}');
            const baseBytes = parseInt('${{ steps.base-size.outputs.bytes }}');
            const diff = prBytes - baseBytes;
            const pct = baseBytes > 0 ? ((diff / baseBytes) * 100).toFixed(2) : '0.00';
            const fmt = (b) => (b / 1024).toFixed(1) + ' KB';

            const arrow = diff > 0 ? '🔴 +' : diff < 0 ? '🟢 ' : '⚪ ';
            const sign = diff > 0 ? '+' : '';

            const body = [
              '## Bundle Size Report',
              '',
              '| | Size |',
              '|---|---|',
              `| Base (\`${{ github.base_ref }}\`) | ${fmt(baseBytes)} |`,
              `| PR | ${fmt(prBytes)} |`,
              `| Diff | ${arrow}${sign}${fmt(diff)} (${sign}${pct}%) |`,
              '',
              diff > 5120
                ? '> ⚠️ Bundle increased by more than 5 KB — review before merging.'
                : '> ✅ Bundle size looks good.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Bundle Size Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
